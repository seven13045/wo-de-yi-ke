  <h1>「我的一课」技术支持</h1>
  <p>「我的一课」帮助高校教师查看今日课表、周视图与学期安排，支持 PDF / 截图 / AI 识图导入。</p>

  <h2>常见问题</h2>
  <ul>
    <li><strong>如何导入课表？</strong> 点击右上角菜单 → 导入课表，可选择教务 PDF、截图或 AI 识图。</li>
    <li><strong>AI 识图需要什么？</strong> 在设置中填入您自己的阿里云 DashScope API Key，Key 仅保存在本机钥匙串。</li>
    <li><strong>数据存在哪里？</strong> 课表保存在本机，不上传至开发者服务器。</li>
  </ul>
